<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Challenge Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <!-- Login Screen -->
    <section id="loginScreen" class="card">

        <h1>Daily Challenge Tracker</h1>

        <p class="subtitle">
            Build your streak.
            Improve yourself one day at a time.
        </p>

        <input
            id="usernameInput"
            type="text"
            maxlength="20"
            placeholder="Enter Username">

        <button id="startBtn">
            Start
        </button>

    </section>



    <!-- Dashboard -->
    <section id="dashboard" class="hidden">

        <header class="topBar">

            <div>

                <h2 id="greeting">
                    Welcome
                </h2>

                <p id="todayDate"></p>

            </div>

            <button id="logoutBtn">
                Logout
            </button>

        </header>



        <!-- Streak -->

        <div class="card">

            <h3>🔥 Current Streak</h3>

            <h1 id="streakCount">
                0
            </h1>

            <p id="streakText">
                Keep going!
            </p>

        </div>



        <!-- Daily Tasks -->

        <div class="card">

            <h3>Today's Challenge</h3>

            <div id="tasks" class="taskGrid">

            </div>

            <button
                id="doneBtn"
                disabled>

                Done

            </button>

            <p id="taskStatus"></p>

        </div>



        <!-- Calendar -->

        <div class="card">

            <h3 id="calendarTitle">

                Calendar

            </h3>

            <div id="calendar">

            </div>

        </div>



        <!-- History -->

        <div class="card">

            <h3>History</h3>

            <table>

                <thead>

                <tr>

                    <th>Date</th>

                    <th>Task</th>

                </tr>

                </thead>

                <tbody id="historyTable">

                </tbody>

            </table>

        </div>



        <!-- Admin Panel -->

        <section
            id="adminPanel"
            class="card hidden">

            <h3>

                Admin Panel

            </h3>

            <p>

                Edit the 5 daily tasks.

            </p>

            <textarea
                id="adminTasks"
                rows="8"
                placeholder="One task per line"></textarea>

            <button id="saveTasks">

                Save Tasks

            </button>

        </section>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
