<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Challenge Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <!-- Username Screen -->
    <section id="loginScreen" class="card hidden">
      <h1>Welcome</h1>
      <p>Enter a username to begin your daily challenge.</p>
      <input type="text" id="usernameInput" placeholder="Your username" maxlength="20" />
      <button id="startBtn">Start</button>
    </section>

    <!-- Dashboard -->
    <section id="dashboard" class="hidden">
      <header class="top">
        <h2 id="greeting"></h2>
        <div class="streak">
           Streak: <span id="streakCount">0</span>
        </div>
      </header>

      <!-- Tasks -->
      <section class="card">
        <h3>Today’s Challenge</h3>
        <div id="tasks" class="tasks"></div>
        <button id="doneBtn" disabled>Done</button>
        <p id="taskStatus" class="muted"></p>
      </section>

      <!-- Calendar -->
      <section class="card">
        <h3 id="calendarTitle"></h3>
        <div id="calendar" class="calendar"></div>
      </section>

      <!-- History -->
      <section class="card">
        <h3>History</h3>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Task</th>
            </tr>
          </thead>
          <tbody id="historyTable"></tbody>
        </table>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
